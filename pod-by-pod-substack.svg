<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="460" viewBox="0 0 680 460" role="img">
<title>Pod-by-pod scheduling exhausts cluster capacity sequentially</title>
<desc>Six pods queue independently. Each pod moves through Filter, Score, Reserve, and Bind, then lands in a cluster slot. Pod six enters Filter, fails because no slot is free, and returns to the queue marked unschedulable.</desc>

<rect x="0" y="0" width="680" height="460" fill="#ffffff"/>

<text x="40" y="30" font-size="14" font-weight="500" font-family="sans-serif" fill="#2C2C2A">cluster capacity · 5 slots free</text>

<rect x="40"  y="45" width="100" height="40" rx="6" fill="none" stroke="#888780" stroke-width="0.5"/>
<rect x="150" y="45" width="100" height="40" rx="6" fill="none" stroke="#888780" stroke-width="0.5"/>
<rect x="260" y="45" width="100" height="40" rx="6" fill="none" stroke="#888780" stroke-width="0.5"/>
<rect x="370" y="45" width="100" height="40" rx="6" fill="none" stroke="#888780" stroke-width="0.5"/>
<rect x="480" y="45" width="100" height="40" rx="6" fill="none" stroke="#888780" stroke-width="0.5"/>
<text x="625" y="67" font-size="12" font-family="sans-serif" text-anchor="middle" fill="#A32D2D">no slot</text>

