  <rect x="40" y="45" width="100" height="40" rx="6" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="90" y="67" font-size="12" font-family="sans-serif" text-anchor="middle" dominant-baseline="central" fill="#04342C">pod 1</text>
  <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.3s" fill="freeze"/>
</g>
