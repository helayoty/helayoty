  <animate attributeName="opacity" from="0" to="1" begin="4.3s" dur="0.3s" fill="freeze"/>
</g>
<g opacity="0">
  <rect x="260" y="45" width="100" height="40" rx="6" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.5"/>
