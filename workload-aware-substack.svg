  <animateTransform attributeName="transform" type="translate" values="0,0; 175,0" keyTimes="0;1" begin="0.4s" dur="0.4s" fill="freeze"/>
  <animateTransform attributeName="transform" type="translate" values="175,0; 265,0" keyTimes="0;1" begin="0.9s" dur="0.35s" fill="freeze" additive="replace"/>
