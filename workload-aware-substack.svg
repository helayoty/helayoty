<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="500" viewBox="0 0 680 500" role="img">
<title>Workload-aware scheduling rejects, background workloads depart, group binds atomically</title>
<desc>The PodGroup of six traverses the framework and is rejected at Permit because only three slots are free. It returns to the queue with zero slots held. All three background workloads terminate, freeing the entire cluster. The group requeues, traverses the framework again, and all six pods bind atomically.</desc>

<rect x="0" y="0" width="680" height="500" fill="#ffffff"/>

<text x="40" y="30" font-size="14" font-weight="500" font-family="sans-serif" fill="#2C2C2A">cluster capacity · 6 slots · 3 occupied by background workload</text>

<rect x="40"  y="45" width="95" height="40" rx="6" fill="none" stroke="#888780" stroke-width="0.5"/>
<rect x="145" y="45" width="95" height="40" rx="6" fill="none" stroke="#888780" stroke-width="0.5"/>
<rect x="250" y="45" width="95" height="40" rx="6" fill="none" stroke="#888780" stroke-width="0.5"/>
